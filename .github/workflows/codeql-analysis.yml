name: CodeQL
'on':
  push:
    branches:
    - main
  schedule:
  - cron: 0 2 * * *
permissions:
  contents: read
concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  selective-checks:
    name: Selective checks
    runs-on: ubuntu-latest
    outputs:
      needs-python-scans: ${{ steps.selective-checks.outputs.needs-python-scans }}
      needs-javascript-scans: ${{ steps.selective-checks.outputs.needs-javascript-scans
        }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        fetch-depth: 2
        persist-credentials: false
    - name: Selective checks
      id: selective-checks
      env:
        EVENT_NAME: ${{ github.event_name }}
        TARGET_COMMIT_SHA: ${{ github.sha }}
      run: "if [[ ${EVENT_NAME} == \"pull_request\" ]]; then\n  # Run selective checks\n\
        \  ./scripts/ci/selective_ci_checks.sh \"${TARGET_COMMIT_SHA}\"\nelse\n  #\
        \ Run all checks\n  ./scripts/ci/selective_ci_checks.sh\nfi\n"
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs:
    - selective-checks
    strategy:
      fail-fast: false
      matrix:
        language:
        - python
        - javascript
    permissions:
      actions: read
      contents: read
      pull-requests: read
      security-events: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      with:
        persist-credentials: false
      if: 'matrix.language == ''python'' && needs.selective-checks.outputs.needs-python-scans
        == ''true'' ||

        matrix.language == ''javascript'' && needs.selective-checks.outputs.needs-javascript-scans
        == ''true''

        '
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v1
      with:
        languages: ${{ matrix.language }}
      if: 'matrix.language == ''python'' && needs.selective-checks.outputs.needs-python-scans
        == ''true'' ||

        matrix.language == ''javascript'' && needs.selective-checks.outputs.needs-javascript-scans
        == ''true''

        '
    - name: Autobuild
      uses: github/codeql-action/autobuild@v1
      if: 'matrix.language == ''python'' && needs.selective-checks.outputs.needs-python-scans
        == ''true'' ||

        matrix.language == ''javascript'' && needs.selective-checks.outputs.needs-javascript-scans
        == ''true''

        '
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v1
      if: 'matrix.language == ''python'' && needs.selective-checks.outputs.needs-python-scans
        == ''true'' ||

        matrix.language == ''javascript'' && needs.selective-checks.outputs.needs-javascript-scans
        == ''true''

        '
